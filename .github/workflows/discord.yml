name: Notify Discord on Release

on:
  release:
    types: [published]

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.USFDISCORDHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          CLEAN_DESCRIPTION=$(echo "$RELEASE_BODY" \
            | sed -E 's/\[!\[.*?\]\(.*?\)\]\(.*?\)//g' \
            | sed -E 's/!\[.*?\]\(.*?\)//g')

          EMBED=$(jq -n \
            --arg title "🚀 Новий реліз: $RELEASE_NAME" \
            --arg description "$CLEAN_DESCRIPTION" \
            --arg url "$RELEASE_URL" \
            --arg version "Версія: $RELEASE_TAG" \
            --arg yt "https://youtu.be/4AwL8TKXcTU" \
            --arg loc "https://scloc.pp.ua/" \
            --arg dc "https://discord.gg/y2c7M9cgbk" \
            --argjson color 5814783 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $version,
                color: $color,
                fields: [
                  {
                    name: "▶️ Демонстраційне відео",
                    value: $yt,
                    inline: false
                  },
                  {
                    name: "🇺🇦 Україїнізатор для Star Citizen",
                    value: $loc,
                    inline: false
                  },
                  {
                    name: "💬 Україномовна спільнота",
                    value: $dc,
                    inline: false
                  },
                  {
                    name: "📋 Зміни",
                    value: (if ($description | length) > 1000 then ($description[0:1000] + "...") else $description end),
                    inline: false
                  }
                ]
              }]
            }')

          curl -X POST -H "Content-Type: application/json" \
            -d "$EMBED" \
            "$DISCORD_WEBHOOK"
