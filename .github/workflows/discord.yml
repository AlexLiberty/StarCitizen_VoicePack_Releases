name: Notify Discord on Release

on:
  release:
    types: [published]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.USFDISCORDHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}

        run: |
          # --- 1. ВИТЯГУЄМО ЧИСТІ URL ---
          URLS=$(echo "$RELEASE_BODY" | grep -oP '\[[^]]*\]\(\K[^)]+' )

          YT=$(echo "$URLS" | grep 'youtu\.be' | head -n1)
          LOC=$(echo "$URLS" | grep 'scloc\.pp\.ua' | head -n1)
          DC=$(echo "$URLS" | grep 'discord\.gg' | head -n1)
          REF=$(echo "$URLS" | grep 'robertsspaceindustries\.com' | head -n1)

          # --- 2. ЧИСТИМО ТЕКСТ ---
          CLEAN_DESCRIPTION=$(echo "$RELEASE_BODY" \
            | sed -E 's/\[!\[.*?\]\(.*?\)\]\(.*?\)//g' \
            | sed -E 's/!\[.*?\]\(.*?\)//g')

          # --- 3. ФІЛЬТР ---
          FILTERED=$(echo "$CLEAN_DESCRIPTION" | awk '
            /⚠️/ { print; next }
            /ℹ️/ { print; next }
          ')

          # fallback
          if [ -z "$FILTERED" ]; then
            FILTERED=$(echo "$CLEAN_DESCRIPTION" | tail -n 10)
          fi

          # --- 4. ФОРМУЄМО ЛІНКИ ---
          LINKS=""

          if [ -n "$YT" ]; then
            LINKS="$LINKS\n▶️ Демонстраційне відео\n$YT"
          fi

          if [ -n "$LOC" ]; then
            LINKS="$LINKS\n\n🇺🇦 Україїнізатор для Star Citizen\n$LOC"
          fi

          if [ -n "$DC" ]; then
            LINKS="$LINKS\n\n💬 Україномовна спільнота\n$DC"
          fi

          if [ -n "$REF" ]; then
            LINKS="$LINKS\n\n🤝 Підтримка та бонус\n$REF"
          fi

          FILTERED=$(printf "%s\n\n%s" "$FILTERED" "$LINKS")

          # --- 5. ФУТЕР ---
          FILTERED=$(printf "%s\n\n%s" \
            "$FILTERED" \
            "Зоряних пригод, Капітане! Зустрінемось серед зірок ✨")

          # --- 6. НОРМАЛІЗАЦІЯ ---
          FILTERED=$(echo "$FILTERED" \
            | sed -E ':a;N;$!ba;s/\n{3,}/\n\n/g')

          FORMATTED=$(echo "$FILTERED" \
            | sed -E '1{/^$/d}; :a;/^\n*$/{$d;N;ba}' \
            | head -c 2000)

          # --- 7. EMBED ---
          EMBED=$(jq -n \
            --arg title "🚀 Новий реліз: $RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg version "Версія: $RELEASE_TAG" \
            --arg body "$FORMATTED" \
            --argjson color 5814783 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: ($version + "\n\n" + $body),
                color: $color
              }]
            }')

          # --- 8. SEND ---
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$EMBED" \
            "$DISCORD_WEBHOOK"
