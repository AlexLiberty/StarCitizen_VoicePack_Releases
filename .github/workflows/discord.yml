name: Notify Discord on Release

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (optional)'
        required: false

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare release data
        id: release
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$TAG" ]; then
            RELEASE_JSON=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)

            echo "name=$(echo $RELEASE_JSON | jq -r '.name')" >> $GITHUB_OUTPUT
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$(echo $RELEASE_JSON | jq -r '.body')" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "url=$(echo $RELEASE_JSON | jq -r '.html_url')" >> $GITHUB_OUTPUT
            echo "tag=$(echo $RELEASE_JSON | jq -r '.tag_name')" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.release.body }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.release.html_url }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.USFDISCORDHOOK }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}

        run: |
          # --- 1. Очистка markdown (прибираємо картинки/badges) ---
          CLEAN_DESCRIPTION=$(echo "$RELEASE_BODY" \
            | sed -E 's/\[!\[.*?\]\(.*?\)\]\(.*?\)//g' \
            | sed -E 's/!\[.*?\]\(.*?\)//g')

          # --- 2. ФІЛЬТР важливого ---
          FILTERED=$(echo "$CLEAN_DESCRIPTION" | awk '
            /Програма не втручається/ { print; next }
            /повернуто озвучання/ { print; next }
            /реферальним посиланням/ { print; next }
            /http/ { print; next }
          ')

          # --- 3. fallback якщо нічого не знайдено ---
          if [ -z "$FILTERED" ]; then
            FILTERED=$(echo "$CLEAN_DESCRIPTION" | tail -n 15)
          fi

          # --- 4. нормалізація переносів ---
          FILTERED=$(echo "$FILTERED" \
            | sed -E ':a;N;$!ba;s/\n{3,}/\n\n/g')

          # --- 5. trim ---
          FORMATTED=$(echo "$FILTERED" \
            | sed -E '1{/^$/d}; :a;/^\n*$/{$d;N;ba}')

          # --- 6. обмеження під Discord ---
          FORMATTED=$(echo "$FORMATTED" | head -c 2000)

          # --- 7. Embed ---
          EMBED=$(jq -n \
            --arg title "🚀 Новий реліз: $RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg version "Версія: $RELEASE_TAG" \
            --arg body "$FORMATTED" \
            --argjson color 5814783 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: ($version + "\n\n" + $body),
                color: $color
              }]
            }')

          # --- 8. Відправка ---
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$EMBED" \
            "$DISCORD_WEBHOOK"
