name: Notify Discord on Release

on:
  release:
    types: [published]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.USFDISCORDHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}

        run: |
          CLEAN_DESCRIPTION=$(echo "$RELEASE_BODY" \
            | sed -E 's/\[!\[.*?\]\(.*?\)\]\(.*?\)//g' \
            | sed -E 's/!\[.*?\]\(.*?\)//g')

          FILTERED=$(echo "$CLEAN_DESCRIPTION" | awk '
            /Програма не втручається/ { print; next }
            /повернуто озвучання/ { print; next }
            /реферальним посиланням/ { print; next }
            /http/ { print; next }
          ')

          # fallback
          if [ -z "$FILTERED" ]; then
            FILTERED=$(echo "$CLEAN_DESCRIPTION" | tail -n 15)
          fi

          # --- ВСТАВКА ЛІНКІВ ---
          FILTERED=$(echo "$FILTERED" | awk '
          {
            print
            if ($0 ~ /referral=/) {
              print ""
              print "[▶️ Демонстраційне відео](https://youtu.be/4AwL8TKXcTU)"
              print "[🇺🇦 Україїнізатор для Star Citizen](https://scloc.pp.ua/)"
              print "[💬 Приєднатись до найбільшої україномовної спільноти](https://discord.gg/y2c7M9cgbk)"
            }
          }')

          FILTERED=$(echo "$FILTERED" \
            | sed -E ':a;N;$!ba;s/\n{3,}/\n\n/g')

          FORMATTED=$(echo "$FILTERED" \
            | sed -E '1{/^$/d}; :a;/^\n*$/{$d;N;ba}' \
            | head -c 2000)

          EMBED=$(jq -n \
            --arg title "🚀 Новий реліз: $RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg version "Версія: $RELEASE_TAG" \
            --arg body "$FORMATTED" \
            --argjson color 5814783 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: ($version + "\n\n" + $body),
                color: $color
              }]
            }')

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$EMBED" \
            "$DISCORD_WEBHOOK"
