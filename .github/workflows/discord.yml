name: Notify Discord on Release

on:
  release:
    types: [published]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.USFDISCORDHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}

        run: |
          # 1. Чистимо markdown (видаляємо badges і картинки)
          CLEAN_DESCRIPTION=$(echo "$RELEASE_BODY" \
            | sed -E 's/\[!\[.*?\]\(.*?\)\]\(.*?\)//g' \
            | sed -E 's/!\[.*?\]\(.*?\)//g')

          # 2. Виділяємо features (рядки з емодзі)
          FEATURES=$(echo "$CLEAN_DESCRIPTION" \
            | grep -E '^[[:space:]]*[✅❌⚠️ℹ️]' \
            | sed 's/^[[:space:]]*/• /')

          # 3. Основний опис (без списків)
          DESCRIPTION=$(echo "$CLEAN_DESCRIPTION" \
            | grep -vE '^[[:space:]]*[✅❌⚠️ℹ️]' \
            | sed '/^\s*$/d')

          # 4. Обрізка під Discord limits
          DESCRIPTION=$(echo "$DESCRIPTION" | head -c 900)
          FEATURES=$(echo "$FEATURES" | head -c 900)

          # fallback якщо пусто
          if [ -z "$FEATURES" ]; then
            FEATURES="—"
          fi

          # 5. Формуємо embed
          EMBED=$(jq -n \
            --arg title "🚀 Новий реліз: $RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg version "Версія: $RELEASE_TAG" \
            --arg desc "$DESCRIPTION" \
            --arg features "$FEATURES" \
            --arg yt "https://youtu.be/4AwL8TKXcTU" \
            --arg loc "https://scloc.pp.ua/" \
            --arg dc "https://discord.gg/y2c7M9cgbk" \
            --argjson color 5814783 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $version,
                color: $color,
                thumbnail: {
                  url: "https://img.youtube.com/vi/4AwL8TKXcTU/hqdefault.jpg"
                },
                fields: [
                  {
                    name: "▶️ Демонстраційне відео",
                    value: $yt,
                    inline: false
                  },
                  {
                    name: "🇺🇦 Україїнізатор для Star Citizen",
                    value: $loc,
                    inline: false
                  },
                  {
                    name: "💬 Україномовна спільнота",
                    value: $dc,
                    inline: false
                  },
                  {
                    name: "📖 Опис",
                    value: $desc,
                    inline: false
                  },
                  {
                    name: "⚙️ Можливості",
                    value: $features,
                    inline: false
                  }
                ]
              }]
            }')

          # 6. Відправка
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$EMBED" \
            "$DISCORD_WEBHOOK"
