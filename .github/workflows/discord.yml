name: Notify Discord on Release

on:
  release:
    types: [published]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.USFDISCORDHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}

        run: |
          # --- 1. ВИТЯГУЄМО ЛІНКИ З BADGE ---
          EXTRACTED_LINKS=$(echo "$RELEASE_BODY" \
            | grep -oP '\]\(\Khttps://[^)]+' )

          # --- 2. ОЧИСТКА markdown ---
          CLEAN_DESCRIPTION=$(echo "$RELEASE_BODY" \
            | sed -E 's/\[!\[.*?\]\(.*?\)\]\(.*?\)//g' \
            | sed -E 's/!\[.*?\]\(.*?\)//g')

          # --- 3. ФІЛЬТР ---
          FILTERED=$(echo "$CLEAN_DESCRIPTION" | awk '
            /⚠️/ { print; next }
            /ℹ️/ { print; next }
            /Програма не втручається/ { print; next }
            /повернуто озвучання/ { print; next }
          ')

          # fallback
          if [ -z "$FILTERED" ]; then
            FILTERED=$(echo "$CLEAN_DESCRIPTION" | tail -n 10)
          fi

          # --- 4. ДОДАЄМО ЛІНКИ ---
          FILTERED=$(printf "%s\n\n%s" "$FILTERED" "$EXTRACTED_LINKS")

          # --- 5. ДОДАЄМО ФІНАЛЬНИЙ РЯДОК ---
          FILTERED=$(printf "%s\n\n%s" \
            "$FILTERED" \
            "Зоряних пригод, Капітане! Зустрінемось серед зірок ✨")

          # --- 6. НОРМАЛІЗАЦІЯ ---
          FILTERED=$(echo "$FILTERED" \
            | sed -E ':a;N;$!ba;s/\n{3,}/\n\n/g')

          FORMATTED=$(echo "$FILTERED" \
            | sed -E '1{/^$/d}; :a;/^\n*$/{$d;N;ba}' \
            | head -c 2000)

          # --- 7. EMBED ---
          EMBED=$(jq -n \
            --arg title "🚀 Новий реліз: $RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg version "Версія: $RELEASE_TAG" \
            --arg body "$FORMATTED" \
            --argjson color 5814783 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: ($version + "\n\n" + $body),
                color: $color
              }]
            }')

          # --- 8. SEND ---
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$EMBED" \
            "$DISCORD_WEBHOOK"
